<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BLOCKS</title>
<meta name="theme-color" content="#0b0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Blocks">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230b0c0f'/%3E%3Crect x='12.2' y='7.5' width='7.6' height='4.6' rx='1.3' fill='%23ff6f2e'/%3E%3Crect x='9.8' y='13.7' width='12.4' height='4.6' rx='1.3' fill='%23ff6f2e'/%3E%3Crect x='7.2' y='19.9' width='17.6' height='4.6' rx='1.3' fill='%23ff6f2e'/%3E%3C/svg%3E">
<style>
:root{
--bg:#0b0c0f;--surface:#14161a;--surface2:#1a1d22;--border:#24272e;--border-h:#343845;
--text:#e9eaed;--dim:#9aa1ac;--muted:#6b727e;
--ember:#ff6f2e;--ember-hot:#ffa14d;--ember-soft:rgba(255,111,46,.12);--ember-line:rgba(255,111,46,.32);
--sage:#7fb069;--sage-bg:rgba(127,176,105,.1);--sage-line:rgba(127,176,105,.34);
--blue:#7e9cc0;--blue-soft:rgba(126,156,192,.12);--blue-line:rgba(126,156,192,.3);
--danger:#e0604f;
--f:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:var(--f);font-size:17px;line-height:1.45;-webkit-font-smoothing:antialiased;min-height:100vh;touch-action:manipulation}
button{font-family:var(--f);color:inherit;background:none;border:none;cursor:pointer;font-size:inherit;touch-action:manipulation}
a{color:var(--ember);text-decoration:none}
.num{font-variant-numeric:tabular-nums}
::selection{background:var(--ember-soft)}
:focus-visible{outline:2px solid var(--ember-line);outline-offset:2px}

/* ── chrome ── */
.hd{position:sticky;top:0;z-index:50;background:rgba(11,12,15,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.hdi{max-width:560px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;padding-top:max(14px,env(safe-area-inset-top))}
.wm{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:700;letter-spacing:.22em;color:var(--dim)}
.hbt{min-width:44px;min-height:38px;display:flex;align-items:center;justify-content:center;border-radius:10px;color:var(--dim)}
.hbt:active{background:var(--surface2)}
.tb{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(11,12,15,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border)}
.tbi{max-width:560px;margin:0 auto;display:flex;padding-bottom:env(safe-area-inset-bottom)}
.tbb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;color:var(--muted);font-size:10.5px;font-weight:600;letter-spacing:.04em}
.tbb svg{display:block}
.tbb.on{color:var(--ember)}
.co{max-width:560px;margin:0 auto;padding:20px 16px 110px}
.co.nopad{padding-bottom:130px}

/* ── view transition ── */
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.co>*{animation:rise .3s cubic-bezier(.22,1,.36,1) both}

/* ── banners ── */
.ban{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:16px;font-size:15px;color:var(--dim)}
.ban b{color:var(--text);font-weight:600}
.ban .bba{margin-left:auto;display:flex;gap:8px;flex-shrink:0}
.ban.em{border-color:var(--ember-line);background:var(--ember-soft)}
.bbtn{font-size:14px;font-weight:650;color:var(--ember);padding:8px 12px;border-radius:9px;background:rgba(255,111,46,.14);white-space:nowrap}
.bbtn.q{background:transparent;color:var(--muted)}

/* ── hero ── */
.hero{display:flex;align-items:center;gap:18px;margin:2px 0 20px}
.rw{position:relative;width:72px;height:72px;flex-shrink:0}
.rt{fill:none;stroke:#21242b;stroke-width:6}
.rf{fill:none;stroke:var(--ember);stroke-width:6;stroke-linecap:round;stroke-dasharray:100;stroke-dashoffset:100;transition:stroke-dashoffset .5s cubic-bezier(.22,1,.36,1)}
.rf.full{stroke:var(--sage)}
.rn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
.rn span{font-size:12px;color:var(--muted);font-weight:600;margin-left:1px}
.eyebrow{font-size:12.5px;font-weight:650;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.eyebrow b{color:var(--ember);font-weight:650}
.title{font-size:26px;font-weight:700;letter-spacing:-.015em;line-height:1.15}
.hsub{font-size:14px;color:var(--muted);margin-top:4px}
.hsub .sg{color:var(--sage);font-weight:600}

/* ── week strip ── */
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:22px}
.day{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:10px 2px 9px;text-align:center;position:relative;transition:border-color .15s,background .15s}
.day:active{background:var(--surface2)}
.day .dl{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.day .dw{font-size:10.5px;font-weight:650;color:var(--dim);line-height:1.2}
.day.lift .dw{color:var(--ember)}
.day.cardio .dw{color:var(--blue)}
.day.off .dw{color:var(--muted)}
.day.on{border-color:var(--border-h);background:var(--surface2);box-shadow:0 0 0 1.5px var(--border-h)}
.day .td{position:absolute;top:6px;right:6px;width:4.5px;height:4.5px;border-radius:50%;background:var(--ember)}

/* ── sections ── */
.sl{display:flex;align-items:baseline;gap:10px;margin:26px 0 10px}
.sl:first-child{margin-top:0}
.sl .lt{font-size:12.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.sl .rule{flex:1;height:1px;background:var(--border)}
.sl .cnt{font-size:13px;font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums}
.sl.done .lt,.sl.done .cnt{color:var(--sage)}
.note{font-size:14.5px;color:var(--muted);line-height:1.55;margin:-2px 0 12px}

/* ── cards & buttons ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;min-height:52px;border-radius:13px;font-size:16.5px;font-weight:650;transition:transform .12s,opacity .15s}
.btn:active{transform:scale(.985)}
.btn-p{background:var(--ember);color:#16100b}
.btn-o{border:1px solid var(--border-h);color:var(--text);background:var(--surface2)}
.btn-d{color:var(--danger)}
.scard-t{font-size:19px;font-weight:700;letter-spacing:-.01em}
.scard-m{font-size:14px;color:var(--muted);margin:3px 0 14px}
.lnk{font-size:14.5px;font-weight:600;color:var(--ember);padding:6px 0;display:inline-block}

/* ── check rows ── */
.ck{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:12px 14px;margin-bottom:7px;min-height:54px;user-select:none;-webkit-user-select:none}
.ck:active{background:var(--surface2)}
.ck.done{border-color:var(--sage-line);background:var(--sage-bg)}
.cb{width:27px;height:27px;border-radius:8px;border:2px solid var(--border-h);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--bg);transition:background .2s,border-color .2s}
.cb svg{width:14px;height:14px}
.cb path{stroke-dasharray:1;stroke-dashoffset:1;transition:stroke-dashoffset .25s ease .04s}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.16)}100%{transform:scale(1)}}
.ck.done .cb,.mc.done .cb{background:var(--sage);border-color:var(--sage);animation:pop .3s cubic-bezier(.22,1,.36,1)}
.ck.done .cb path,.mc.done .cb path{stroke-dashoffset:0}
.ckm{flex:1;min-width:0}
.ckn{font-size:15.5px;font-weight:600;line-height:1.3}
.ck.done .ckn{color:var(--dim)}
.ckr{font-size:13px;color:var(--muted);margin-top:2px;line-height:1.45}
.vl{font-size:13px;font-weight:600;color:var(--ember);margin-left:8px;white-space:nowrap}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 22px}
.mc{display:flex;align-items:center;gap:12px;padding:9px 2px;border-radius:10px;min-height:46px;user-select:none;-webkit-user-select:none}
.mc:active{background:var(--surface)}
.mc .cb{width:24px;height:24px;border-radius:7px}
.mc .cb svg{width:12px;height:12px}
.mcn{font-size:15px;color:var(--dim);line-height:1.35}
.mc.done .mcn{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--sage-line)}
@media(max-width:480px){.mgrid{grid-template-columns:1fr}}

/* ── session header ── */
.shd{position:sticky;top:0;z-index:50;background:rgba(11,12,15,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.shdi{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:12px 12px;padding-top:max(12px,env(safe-area-inset-top))}
.shd .bk{min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;border-radius:11px;color:var(--dim)}
.shd .bk:active{background:var(--surface2)}
.shm{flex:1;min-width:0}
.sht{font-size:17px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shs{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:1px}
.fin{background:var(--ember);color:#16100b;font-size:15px;font-weight:700;padding:10px 16px;border-radius:11px;flex-shrink:0}
.fin:active{transform:scale(.97)}
.fin.q{background:var(--surface2);color:var(--text);border:1px solid var(--border-h)}

/* ── exercise card & set rows ── */
.exc{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:15px 14px 12px;margin-bottom:12px}
.exc.fin{border-color:var(--sage-line)}
.exh{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.exn{font-size:16.5px;font-weight:700;letter-spacing:-.01em;flex:1;min-width:0}
.chip{font-size:10.5px;font-weight:700;letter-spacing:.06em;padding:3px 8px;border-radius:6px;flex-shrink:0;text-transform:uppercase}
.chip.em{color:var(--ember);background:var(--ember-soft)}
.chip.bl{color:var(--blue);background:var(--blue-soft)}
.chip.off{color:var(--muted);background:var(--surface2)}
.exs{font-size:13.5px;color:var(--dim);margin-bottom:2px}
.ghost{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;margin-bottom:10px}
.ghost b{color:var(--dim);font-weight:600}
.cols{display:grid;grid-template-columns:30px 1fr 1fr 58px;gap:7px;padding:0 2px;margin-bottom:5px}
.cols span{font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;text-align:center}
.cols span:first-child{text-align:left}
.sr{display:grid;grid-template-columns:30px 1fr 1fr 58px;gap:7px;align-items:center;padding:5px 2px;border-radius:12px}
.sr+.sr{margin-top:2px}
.srn{font-size:13px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;text-align:left;padding-left:4px}
.sr.wu .srn{color:var(--blue)}
.stp{display:flex;align-items:stretch;background:var(--surface2);border:1px solid var(--border);border-radius:11px;overflow:hidden;height:46px}
.stb{width:38px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:22px;font-weight:500;flex-shrink:0;user-select:none;-webkit-user-select:none}
.stb:active{background:var(--border);color:var(--text)}
.stv{flex:1;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;min-width:0;letter-spacing:-.01em}
.stv .u{font-size:10px;color:var(--muted);font-weight:600;margin-left:2px}
.vin{width:100%;background:transparent;border:none;color:var(--text);font-size:17px;font-weight:700;text-align:center;font-family:var(--f);font-variant-numeric:tabular-nums}
.vin:focus{outline:none}
.lg{height:46px;border-radius:11px;border:1.5px solid var(--border-h);display:flex;align-items:center;justify-content:center;color:var(--muted)}
.lg svg{width:20px;height:20px}
.lg:active{background:var(--ember-soft);border-color:var(--ember-line);color:var(--ember)}
.sr.done{background:var(--sage-bg)}
.sr.done .dtx{font-size:15.5px;font-weight:600;color:var(--dim);font-variant-numeric:tabular-nums;grid-column:2/4;text-align:center}
.sr.done .dck{height:40px;display:flex;align-items:center;justify-content:center;color:var(--sage)}
.sr.done .dck svg{width:18px;height:18px}
.adds{font-size:14px;font-weight:600;color:var(--muted);padding:9px 4px 4px;display:inline-block}
.adds:active{color:var(--dim)}
.rowx{font-size:13px;font-weight:600;color:var(--danger);padding:8px 10px}

/* ── rest chip ── */
.restc{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(14px + env(safe-area-inset-bottom));z-index:60;width:min(92vw,420px);background:#1d2026;border:1px solid var(--border-h);border-radius:16px;padding:11px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 12px 32px -8px rgba(0,0,0,.6)}
.restc.hide{display:none}
.restc.zero{border-color:var(--sage-line);background:#1b231b}
@keyframes pulse{0%,100%{box-shadow:0 12px 32px -8px rgba(0,0,0,.6)}50%{box-shadow:0 0 0 6px rgba(127,176,105,.18)}}
.restc.zero{animation:pulse 1.2s ease-in-out 3}
.rcm{flex:1;min-width:0}
.rcl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.rct{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.01em;line-height:1.1}
.restc.zero .rct{color:var(--sage)}
.rcp{height:3.5px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.rcpf{height:100%;background:var(--ember);border-radius:2px;transition:width .25s linear}
.restc.zero .rcpf{background:var(--sage)}
.rcb{font-size:14px;font-weight:700;color:var(--text);background:var(--surface2);border:1px solid var(--border-h);padding:10px 13px;border-radius:11px;flex-shrink:0}
.rcb:active{background:var(--border)}

/* ── field steppers (cardio) ── */
.fgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0 12px}
.fld .fl2{font-size:10.5px;font-weight:700;letter-spacing:.07em;color:var(--muted);text-transform:uppercase;text-align:center;margin-bottom:5px}
.seg{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:3px;gap:3px}
.sgb{flex:1;min-height:40px;border-radius:8px;font-size:14.5px;font-weight:650;color:var(--muted);display:flex;align-items:center;justify-content:center}
.sgb.on{background:var(--border-h);color:var(--text)}
.savedl{display:flex;align-items:center;gap:10px;font-size:15.5px;color:var(--dim);font-variant-numeric:tabular-nums}
.savedl b{color:var(--text);font-weight:650}
.savedl .ed{margin-left:auto;font-size:14px;font-weight:650;color:var(--ember);padding:8px 4px}

/* ── history ── */
.hrow{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:8px;min-height:62px}
.hrow:active{background:var(--surface2)}
.hico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:800;letter-spacing:.03em}
.hico.lift{background:var(--ember-soft);color:var(--ember)}
.hico.cardio{background:var(--blue-soft);color:var(--blue)}
.hm{flex:1;min-width:0}
.ht{font-size:15.5px;font-weight:650}
.hs{font-size:13px;color:var(--muted);margin-top:1px;font-variant-numeric:tabular-nums}
.hd2{font-size:12px;color:var(--muted);text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums;line-height:1.4}
.mlab{font-size:12px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin:20px 0 9px}
.empty{text-align:center;color:var(--muted);font-size:15px;padding:46px 20px;line-height:1.6}
.empty .big{font-size:30px;margin-bottom:10px}

/* ── detail ── */
.dex{margin-bottom:16px}
.dexn{font-size:15.5px;font-weight:700;margin-bottom:6px}
.dline{display:flex;gap:8px;flex-wrap:wrap}
.dpill{font-size:14px;font-weight:600;color:var(--dim);background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:5px 10px;font-variant-numeric:tabular-nums}
.dpill.wu{color:var(--blue);opacity:.8}

/* ── program tab ── */
.pdet{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:9px;overflow:hidden}
.pdet summary{list-style:none;display:flex;align-items:center;gap:10px;padding:15px 16px;font-size:15.5px;font-weight:650;cursor:pointer;user-select:none;-webkit-user-select:none}
.pdet summary::-webkit-details-marker{display:none}
.pdet summary .cnt2{margin-left:auto;font-size:13px;color:var(--muted);font-weight:600}
.pdet summary .car{color:var(--muted);transition:transform .2s}
.pdet[open] summary .car{transform:rotate(90deg)}
.pdb{padding:2px 16px 14px}
.tpe{display:flex;align-items:baseline;gap:8px;padding:8px 0;border-top:1px solid var(--border)}
.tpe:first-child{border-top:none}
.tpen{font-size:15px;font-weight:600;flex:1}
.tpes{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
.tpe.offed .tpen,.tpe.offed .tpes{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--border-h)}
.md p{font-size:14.5px;color:var(--dim);line-height:1.65;margin:8px 0}
.md strong{color:var(--text);font-weight:650}
.md ul{margin:6px 0 10px 2px;list-style:none}
.md li{font-size:14.5px;color:var(--dim);line-height:1.6;padding:3px 0 3px 18px;position:relative}
.md li::before{content:'–';position:absolute;left:2px;color:var(--muted)}
.md table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13.5px}
.md th{text-align:left;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:7px 8px;border-bottom:1px solid var(--border)}
.md td{padding:8px;color:var(--dim);border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5;font-variant-numeric:tabular-nums}
.md tr:last-child td{border-bottom:none}

/* ── sheets / overlay ── */
.ov{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center;animation:fdin .2s ease}
@keyframes fdin{from{opacity:0}to{opacity:1}}
@keyframes shup{from{transform:translateY(30px);opacity:.6}to{transform:none;opacity:1}}
.sheet{width:100%;max-width:560px;background:#15171c;border:1px solid var(--border-h);border-bottom:none;border-radius:22px 22px 0 0;padding:10px 18px calc(22px + env(safe-area-inset-bottom));animation:shup .25s cubic-bezier(.22,1,.36,1);max-height:86vh;overflow-y:auto}
.grab{width:38px;height:4.5px;border-radius:3px;background:var(--border-h);margin:4px auto 14px}
.sht2{font-size:19px;font-weight:700;letter-spacing:-.01em;margin-bottom:4px}
.shs2{font-size:14px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.strow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);min-height:56px}
.strow:last-of-type{border-bottom:none}
.stn{flex:1;font-size:16px;font-weight:600}
.stn small{display:block;font-size:13px;color:var(--muted);font-weight:500;margin-top:1px}
.strow .seg{width:128px;flex-shrink:0}

const reference=[
{t:'Phase Gates',b:`**Gate 1 — Phase 3 · ✓ Cleared (Wk 5-6)**
- Test: 25 continuous pain-free double-leg heel raises.
**Gate 2 — Phase 4 · ✓ Cleared (Wk 8)**
- Test: 3 × 15 single-leg raises pain-free. Symmetrical dorsiflexion ROM.

- Test: 25+ single-leg raises matching other side · hop LSI ≥90% · ≥90% plantarflexion LSI · ≥2× BW single-leg raise · 10-20 single-leg hops in place, pain-free.

- Test: hop LSI ≥95% · pain-free max sprint · one week no symptoms.

|Stage|Exercise|Gate|Notes|

{t:'Timeline',b:`- **Wk 5-6 · Cleared** — Gate 1, Phase 3. Seated calf raises began.

{t:'How the Tear Heals',b:`**Phase 1 — Destruction · Hours 0-48.** Torn fibers retract. Hematoma forms scaffold. Neutrophils (hrs 1-24), macrophages (hrs 24-72) secrete growth factors activating satellite cells.
**Phase 2 — Repair · Days 3-21.** Satellite cells fuse into myotubes bridging the gap. Fibroblasts lay Type III collagen — weak, disorganized. Grade II gap too large to fully bridge; scar fills the rest.
**Phase 3 — Remodeling · Weeks 3-6+ months.** Type III → Type I collagen, organized along stress lines. Concentric = moderate stress. Eccentric = highest demand — remodeling stimulus if mature, re-tear if too early.
**Why re-tears happen.** Scar is stiffer than original muscle. The junction between scar and healthy tissue is the weakest link — re-tears happen at the margins. Bulletproofing = surrounding tissue strong enough that the junction never sees failure-threshold forces.
**Peptide false confidence.** BPC-157/TB-500 accelerate early repair, so pain drops — but collagen maturation runs on its own clock. Tissue feels healed while architecture is immature. Gates test structure, not perception.`},

library,
activeProgramId:'p_rtt',
programs:[{id:'p_rtt',name:'Return to Training',subtitle:'Phase IV — rebuilding · Gate 3 next',
 schedule:{0:null,1:'t_pull',2:'t_cardio',3:'t_push',4:'t_pull',5:'t_cardio',6:'t_push'},
 templates,checklists:{daily,dailyNote:'Run the full list twice — one set of each per pass.',mobility,therapist},reference}],

days:{},
dayOverrides:{},

}

/* ═══════════ STATE & PERSISTENCE ═══════════ */
let DB=null;
let S={tab:'today',view:'tabs',sel:null,sid:null,amend:false,det:null,mobFrom:'today',editKey:null};
let PV={},CV=null,CE={spr:false,aer:false},EXTRA={};
let T=null,TINT=null,EINT=null,WL=null,AC=null,UPD=null,IMPORTED=null;
const DY=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAB=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const CHECK='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12.5l4.5 4.5L19 7.5" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" pathLength="1"/></svg>';
const KG=0.45359237;

function ld(){try{DB=JSON.parse(localStorage.getItem('blocks_v1')||'null')}catch(e){DB=null}
if(!DB||DB.schemaVersion!==1){DB=seedDB();sv()}}
function sv(){try{localStorage.setItem('blocks_v1',JSON.stringify(DB))}catch(e){toast('⚠︎ Could not save')}}
function id(p){return p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function tk(d){d=d||new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtDk(dk){const[y,m,d]=dk.split('-').map(Number);return MN[m-1]+' '+d}
function dowOf(dk){const[y,m,d]=dk.split('-').map(Number);return new Date(y,m-1,d).getDay()}
function mmss(ms){const s=Math.max(0,Math.round(ms/1000));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

/* ═══════════ PROGRAM HELPERS ═══════════ */
function prog(){return DB.programs.find(p=>p.id===DB.activeProgramId)||DB.programs[0]}
function tpl(tid){return prog().templates.find(t=>t.id===tid)||null}
function exOf(exId){return DB.library.find(e=>e.id===exId)||{id:exId,name:exId,bw:false,rest:90}}
function effDow(dk){const ov=DB.dayOverrides[dk];return ov==null?dowOf(dk):ov}
function tplForDate(dk){const d=effDow(dk);if(d===-1)return null;const tid=prog().schedule[d];return tid?tpl(tid):null}
function dayChecks(dk){return(DB.days[dk]&&DB.days[dk].c)||[]}
function isTrainingDay(t){return!!(t&&t.kind==='lift')}
function dailyItems(dk){const t=tplForDate(dk);return prog().checklists.daily.filter(d=>!(d.skipOnTraining&&isTrainingDay(t)))}
function sessionsFor(dk){return DB.sessions.filter(s=>s.date===dk)}
function activeSession(){return DB.sessions.find(s=>!s.finishedAt)||null}
function sessById(sid){return DB.sessions.find(s=>s.id===sid)||null}
function workingSets(sess,exId){return sess.sets.filter(s=>s.exId===exId)}

/* ═══════════ UNITS ═══════════ */
function unit(){return DB.settings.unit}
function toU(v,from,to){return from===to?v:(from==='lb'?v*KG:v/KG)}
function rndDisp(v,u){return u==='kg'?Math.round(v*2)/2:Math.round(v)}
function rndInc(v,u){const i=u==='kg'?2.5:5;return Math.round(v/i)*i}
function wInUnit(w){if(!w)return 0;return w.u===unit()?w.v:rndDisp(toU(w.v,w.u,unit()),unit())}
function wPrefill(w){if(!w)return 0;return w.u===unit()?w.v:Math.max(0,rndInc(toU(w.v,w.u,unit()),unit()))}
function fmtW(v,bw){if(bw&&(!v||v<=0))return'BW';if(bw)return'+'+(+v.toFixed(1)*1);return''+(+(+v).toFixed(1)*1)}
function setTxt(st,bw){const v=wInUnit(st.w);return(bw&&(!v||v<=0))?String(st.reps):fmtW(v,bw)+'×'+st.reps}

/* ═══════════ PREFILL & GHOSTS ═══════════ */
function lastSessionWith(exId,excludeSid){
let best=null;
for(const s of DB.sessions){if(s.id===excludeSid||!s.finishedAt)continue;
 if(s.sets.some(x=>x.exId===exId)){if(!best||s.startedAt>best.startedAt)best=s}}
return best}
function prefill(entry,ex,rowIdx,sess){
const isWu=rowIdx<entry.warmups;
const prior=lastSessionWith(ex.id,sess?sess.id:null);
if(prior){const rows=workingSets(prior,ex.id).sort((a,b)=>a.n-b.n);
 const pool=rows.filter(r=>!!r.warmup===isWu);
 const idx=isWu?rowIdx:rowIdx-entry.warmups;
 const src=pool[idx]||pool[pool.length-1];
 if(src)return{w:wPrefill(src.w),reps:src.reps}}
if(sess){const today=workingSets(sess,ex.id).sort((a,b)=>b.n-a.n)[0];
 if(today)return{w:wInUnit(today.w),reps:today.reps}}
return{w:entry.defW||0,reps:entry.defReps||(entry.amrap?8:10)}}
function ghostLine(ex,sess){
const prior=lastSessionWith(ex.id,sess?sess.id:null);
if(!prior)return'';
const rows=workingSets(prior,ex.id).sort((a,b)=>a.n-b.n);
const parts=rows.slice(0,7).map(r=>(r.warmup?'w ':'')+setTxt(r,ex.bw));
return'<div class="ghost"><b>Last · '+fmtDk(prior.date)+'</b> &nbsp;'+parts.join(' · ')+'</div>'}

/* ═══════════ TIMER / AUDIO / WAKE LOCK ═══════════ */
function beep(){if(!DB.settings.sound)return;
try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();
if(AC.state==='suspended')AC.resume();
const t=AC.currentTime;[[0,880],[.18,1175]].forEach(p=>{const o=AC.createOscillator(),g=AC.createGain();
o.frequency.value=p[1];o.connect(g);g.connect(AC.destination);
g.gain.setValueAtTime(.0001,t+p[0]);g.gain.exponentialRampToValueAtTime(.35,t+p[0]+.02);
g.gain.exponentialRampToValueAtTime(.0001,t+p[0]+.16);o.start(t+p[0]);o.stop(t+p[0]+.2)})}catch(e){}}
function startRest(sec,label){if(!sec||sec<=0)return;
T={ends:Date.now()+sec*1000,total:sec,label:label||'Rest',fired:false};
clearInterval(TINT);TINT=setInterval(tickT,250);tickT()}
function killRest(){T=null;clearInterval(TINT);const c=document.getElementById('restc');if(c)c.classList.add('hide')}
function t30(){if(!T)return;T.ends+=30000;T.total+=30;T.fired=false;const c=document.getElementById('restc');if(c)c.classList.remove('zero');tickT()}
function tickT(){const c=document.getElementById('restc');if(!T){if(c)c.classList.add('hide');return}
const left=T.ends-Date.now();
if(c){c.classList.remove('hide');
 const tt=document.getElementById('rcT'),pf=document.getElementById('rcPf'),ll=document.getElementById('rcL');
 if(tt)tt.textContent=left<=0?'Done':mmss(left);
 if(ll)ll.textContent=left<=0?'Rest over — go':T.label;
 if(pf)pf.style.width=Math.max(0,Math.min(100,left/(T.total*10)))+'%';
 if(left<=0)c.classList.add('zero')}
if(left<=0&&!T.fired){T.fired=true;beep()}
if(left<-30000)killRest()}
async function lockOn(){if(!DB.settings.wake||!('wakeLock'in navigator))return;
try{WL=await navigator.wakeLock.request('screen')}catch(e){}}
function lockOff(){if(WL){WL.release().catch(()=>{});WL=null}}
document.addEventListener('visibilitychange',()=>{
if(document.visibilityState==='visible'&&S.view==='session'&&!S.amend)lockOn();
if(document.visibilityState==='visible'&&T)tickT()});

/* ═══════════ EXPORT / IMPORT ═══════════ */
function exportDone(){DB.meta.lastExport=Date.now();sv();toast('Backed up');closeOv();rn()}
function doExport(){
const json=JSON.stringify(DB,null,1);
const name='blocks-'+tk()+'.json';
try{const file=new File([json],name,{type:'application/json'});
 if(navigator.canShare&&navigator.canShare({files:[file]})){
  navigator.share({files:[file]}).then(exportDone).catch(()=>{});return}}catch(e){}
const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([json],{type:'application/json'}));
a.download=name;document.body.appendChild(a);a.click();a.remove();exportDone()}
function doImportPick(){document.getElementById('impf').click()}
function handleImport(file){
const r=new FileReader();
r.onload=()=>{try{const obj=JSON.parse(r.result);
 if(!obj||obj.schemaVersion!==1||!Array.isArray(obj.sessions)||!Array.isArray(obj.programs))throw 0;
 IMPORTED=obj;
 ovConfirm('Replace all data?','This file holds <b>'+obj.sessions.length+' sessions</b>'+(obj.meta&&obj.meta.lastExport?' (exported '+fmtDk(tk(new Date(obj.meta.lastExport)))+')':'')+'. Your current <b>'+DB.sessions.length+' sessions</b> will be replaced.',
 [{label:'Replace everything',fn:'confirmImport',danger:true},{label:'Cancel',fn:'closeOv'}])
}catch(e){toast('Not a valid BLOCKS backup')}};
r.readAsText(file)}
function confirmImport(){if(!IMPORTED)return;DB=IMPORTED;IMPORTED=null;sv();location.reload()}
function nagDue(){
const le=DB.meta.lastExport,n=DB.sessions.filter(s=>s.finishedAt&&(!le||s.finishedAt>le)).length;
if(!n)return 0;
if(Date.now()-(DB.settings.nagDismissed||0)<86400000)return 0;
if(le==null)return n>=3?n:0;
return(Date.now()-le>7*86400000)?n:0}
function nagLater(){DB.settings.nagDismissed=Date.now();sv();rn()}

/* ═══════════ RING / PROGRESS ═══════════ */
function dayProgress(dk){
const t=tplForDate(dk),checks=dayChecks(dk),sess=sessionsFor(dk);
let total=0,done=0;
if(t&&t.kind==='lift'){
 const logged={};sess.forEach(s=>{if(s.templateId===t.id)s.sets.forEach(x=>{logged[x.exId]=(logged[x.exId]||0)+1})});
 t.entries.filter(e=>e.enabled).forEach(e=>{const rows=e.warmups+e.sets;total+=rows;done+=Math.min(rows,logged[e.exId]||0)})}
if(t&&t.kind==='cardio'){
 const cs=sess.find(s=>s.kind==='cardio');
 total+=2;if(cs&&cs.sprints)done++;if(cs&&cs.aerobic)done++;
 (t.checks||[]).filter(c=>c.enabled).forEach(c=>{total++;if(checks.includes(c.id))done++})}

 (t.checks||[]).filter(c=>c.enabled).forEach(c=>{wt++;if(checks.includes(c.id))wd++})}

function clearPV(exId){Object.keys(PV).forEach(k=>{if(k.indexOf(exId+'_')===0)delete PV[k]})}

const sess=sessById(S.sid);if(!sess)return;
const t=tpl(sess.templateId),entry=t.entries.find(e=>e.exId===exId);if(!entry)return;
const ex=exOf(exId),key=exId+'_'+i;
if(!PV[key]){const p=prefill(entry,ex,i,sess);PV[key]={w:p.w,r:p.reps}}
const pv=PV[key];
if(!pv.r||pv.r<1){toast('Reps can\'t be 0');return}
sess.sets.push({exId,n:i+1,w:{v:+pv.w||0,u:unit()},reps:Math.round(pv.r),warmup:i<entry.warmups||undefined,amrap:entry.amrap||undefined,ts:Date.now()});
clearPV(exId);sv();
if(!S.amend){let rem=0;
t.entries.filter(e=>e.enabled).forEach(e=>{const tot=e.warmups+e.sets+(EXTRA[e.exId]||0);
 rem+=Math.max(0,tot-workingSets(sess,e.exId).length)});
if(rem>0)startRest(entry.rest||ex.rest||90,esc(ex.name))}
rn()}

const pv=PV['e_'+exId+'_'+n];if(!pv)return;
if(!pv.r||pv.r<1){toast('Reps can\'t be 0');return}

function inlineMd(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}
function md(src){
const out=[];let tbl=null,ul=null;
const fT=()=>{if(tbl){out.push('<table>'+tbl.map((r,i)=>'<tr>'+r.map(c=>'<t'+(i?'d':'h')+'>'+inlineMd(c)+'</t'+(i?'d':'h')+'>').join('')+'</tr>').join('')+'</table>');tbl=null}};
const fU=()=>{if(ul){out.push('<ul>'+ul.map(li=>'<li>'+inlineMd(li)+'</li>').join('')+'</ul>');ul=null}};
String(src).split('\n').forEach(ln=>{const t=ln.trim();
if(t.startsWith('|')){fU();(tbl=tbl||[]).push(t.replace(/^\||\|$/g,'').split('|').map(c=>c.trim()));return}
if(t.startsWith('- ')){fT();(ul=ul||[]).push(t.slice(2));return}
fT();fU();if(t)out.push('<p>'+inlineMd(t)+'</p>')});
fT();fU();return'<div class="md">'+out.join('')+'</div>'}
